<header class="dashboard-header">
  <nav class="dashboard-nav">
    <div class="brand-block">
      <a class="brand" routerLink="/products">Cerberus</a>
      <span class="brand-subtitle">Member dashboard</span>
    </div>

    <form class="search-shell" (ngSubmit)="onSearch()">
      <mat-icon>search</mat-icon>
      <input
        type="search"
        name="search"
        [(ngModel)]="searchTerm"
        placeholder="Search products, collections, categories" />
      <button type="submit">Search</button>
    </form>

    <div class="header-tools">
      <div class="profile-menu-shell">
        <button
          class="profile-chip"
          type="button"
          (click)="toggleProfileMenu()"
          [attr.aria-expanded]="isProfileMenuOpen"
          aria-haspopup="menu">
        <img
          class="profile-picture"
          [src]="resolveProfileImage(profileData)"
          alt="User Profile"
          referrerpolicy="no-referrer"
          (error)="onImageError($event)" />
        <span class="profile-copy">
          <strong>{{ profileData.name || 'Cerberus Member' }}</strong>
          <small>{{ profileData.email || 'Signed in' }}</small>
        </span>
          <mat-icon class="profile-trigger-icon" [class.open]="isProfileMenuOpen">expand_more</mat-icon>
        </button>

        <div class="profile-dropdown" *ngIf="isProfileMenuOpen" role="menu">
          <button type="button" class="dropdown-item" (click)="navigateTo('/about')">
            <mat-icon>auto_awesome</mat-icon>
            <span>About Us</span>
          </button>
          <button type="button" class="dropdown-item" (click)="navigateTo('/contact')">
            <mat-icon>forum</mat-icon>
            <span>Contact</span>
          </button>
          <button type="button" class="dropdown-item" (click)="navigateTo('/dashboard/cart')">
            <mat-icon>shopping_bag</mat-icon>
            <span>Cart</span>
          </button>
          <button type="button" class="dropdown-item" (click)="navigateTo('/dashboard/wishlist')">
            <mat-icon>favorite</mat-icon>
            <span>Wishlist</span>
          </button>
          <button type="button" class="dropdown-item" (click)="navigateTo('/dashboard/profile')">
            <mat-icon>badge</mat-icon>
            <span>Profile</span>
          </button>
          <button type="button" class="dropdown-item" (click)="navigateTo('/dashboard/addresses')">
            <mat-icon>home_pin</mat-icon>
            <span>Addresses</span>
          </button>
          <button
            type="button"
            class="dropdown-item"
            *ngIf="authService.isLoggedIn()"
            (click)="navigateTo('/dashboard/settings')">
            <mat-icon>tune</mat-icon>
            <span>Settings</span>
          </button>
          <button type="button" class="dropdown-item logout-item" (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Logout</span>
          </button>
        </div>
      </div>
    </div>
  </nav>
</header>
