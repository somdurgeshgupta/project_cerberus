<header class="dashboard-header">
  <nav class="dashboard-nav">
    <div class="brand-block">
      <a class="brand" routerLink="/">Cerberus</a>
      <span class="brand-subtitle">Member dashboard</span>
    </div>

    <form class="search-shell" (ngSubmit)="onSearch()">
      <mat-icon>search</mat-icon>
      <input
        type="search"
        name="search"
        [(ngModel)]="searchTerm"
        placeholder="Search products, collections, categories" />
      <button type="submit">Search</button>
    </form>

    <div class="header-tools">
      <div class="session-pill">
        <span class="session-label">Session</span>
        <strong>{{ formattedCountdown }}</strong>
      </div>

      <button class="profile-chip" type="button" [matMenuTriggerFor]="profileMenu">
        <img
          class="profile-picture"
          [src]="profileData.profileImage"
          alt="User Profile"
          (error)="onImageError($event)" />
        <span class="profile-copy">
          <strong>{{ profileData.name || 'Cerberus Member' }}</strong>
          <small>{{ profileData.email || 'Signed in' }}</small>
        </span>
        <mat-icon class="profile-trigger-icon">expand_more</mat-icon>
      </button>
    </div>

    <mat-menu #profileMenu="matMenu" panelClass="profile-menu-panel">
      <button mat-menu-item routerLink="/about">
        <mat-icon>info</mat-icon>
        <span>About Us</span>
      </button>
      <button mat-menu-item routerLink="/contact">
        <mat-icon>mail</mat-icon>
        <span>Contact</span>
      </button>
      <button mat-menu-item routerLink="/dashboard/cart">
        <mat-icon>shopping_cart</mat-icon>
        <span>Cart</span>
      </button>
      <button mat-menu-item routerLink="/dashboard/wishlist">
        <mat-icon>favorite</mat-icon>
        <span>Wishlist</span>
      </button>
      <button mat-menu-item routerLink="/dashboard/profile">
        <mat-icon>person</mat-icon>
        <span>Profile</span>
      </button>
      <button mat-menu-item routerLink="/dashboard/addresses">
        <mat-icon>location_on</mat-icon>
        <span>Addresses</span>
      </button>
      <button mat-menu-item *ngIf="authService.isLoggedIn()" routerLink="/dashboard/settings">
        <mat-icon>settings</mat-icon>
        <span>Settings</span>
      </button>
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </nav>
</header>
